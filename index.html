<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>MXU · SYNCH</title>
</head>
<body>

  <h1>MXU · SYNCH</h1>
  <button id="run">PX → RESPO → MXU</button>
  <pre id="out"></pre>

  <script type="module">
    import * as MXU from "./mxu.js";

    function onTXT(txt) {
      const out = MXU.fromPX(txt);
      document.getElementById("out").textContent =
        JSON.stringify(out, null, 2);
    }

    document.getElementById("run").addEventListener("click", () => {
      onTXT({ msg: "PX TEST" });
    });
  </script>

</body>
</html>
