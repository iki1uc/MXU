<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AXINXA Visualizer</title>
</head>

<body>

<h1>AXINXA Visualizer</h1>
<pre id="log"></pre>

<script type="module">
  import { AXINXA } from "./AXINXA.js";
  import * as MXU from "./mxu.js";

  const log = document.getElementById("log");
  const orig = console.log;

  console.log = (...args) => {
    orig(...args);
    log.textContent += args.join(" ") + "\n";
  };

  AXINXA.attach(MXU);
</script>

</body>
</html>
